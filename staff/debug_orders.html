<!DOCTYPE html>
<html>
<head>
    <title>Debug Orders</title>
</head>
<body>
    <h1>Debug: Order 2258</h1>
    <div id="result"></div>
    
    <script>
        async function debug() {
            const response = await fetch('../admin/job_orders_api.php?action=list_pending_orders');
            const data = await response.json();
            
            console.log('Total orders:', data.data.length);
            console.log('All order IDs:', data.data.map(o => o.id));
            
            const order2258 = data.data.find(o => String(o.id) === '2258' || o.id === 2258);
            
            document.getElementById('result').innerHTML = `
                <h2>Order 2258 Found: ${order2258 ? 'YES' : 'NO'}</h2>
                ${order2258 ? `
                    <pre>${JSON.stringify(order2258, null, 2)}</pre>
                ` : '<p>Order not in API response</p>'}
                
                <h2>All Orders (first 10):</h2>
                <pre>${JSON.stringify(data.data.slice(0, 10).map(o => ({id: o.id, status: o.status, service: o.service_type})), null, 2)}</pre>
            `;
        }
        
        debug();
    </script>
</body>
</html>
